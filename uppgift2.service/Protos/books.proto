syntax = "proto3";

option csharp_namespace = "LibraryService.Grpc.Books";

package books;

service BookService {
  rpc GetAllBooks (GetAllBooksRequest) returns (GetAllBooksResponse);
  rpc GetBook (GetBookRequest) returns (GetBookResponse);
  rpc CreateBook (CreateBookRequest) returns (CreateBookResponse);
  rpc UpdateBook (UpdateBookRequest) returns (UpdateBookResponse);
  rpc DeleteBook (DeleteBookRequest) returns (DeleteBookResponse);
}

message GetAllBooksRequest {
}

message GetBookRequest {
  int32 id = 1;
}

message CreateBookRequest {
  string title = 1;
  string author = 2;
  string isbn = 3;
  int32 pages = 4;
  int32 published_year = 5;
}

message UpdateBookRequest {
  int32 id = 1;
  string title = 2;
  string author = 3;
  string isbn = 4;
  int32 pages = 5;
  int32 published_year = 6;
}

message DeleteBookRequest {
  int32 id = 1;
}

message GetAllBooksResponse {
  repeated BookDto books = 1;
}

message GetBookResponse {
  BookDto book = 1;
  bool found = 2;
}

message CreateBookResponse {
  BookDto book = 1;
}

message UpdateBookResponse {
  BookDto book = 1;
  bool found = 2;
}

message DeleteBookResponse {
  bool success = 1;
}

message BookDto {
  int32 id = 1;
  string title = 2;
  string author = 3;
  string isbn = 4;
  int32 pages = 5;
  int32 published_year = 6;
  repeated BookCopyDto copies = 7;
}

message BookCopyDto {
  int32 id = 1;
  int32 book_id = 2;
  string copy_number = 3;
}